<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 우리밭 미생물 도우미</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="container">
    <header class="page-header">
        <a href="index.html" class="back-link" aria-label="홈으로">←</a>
        <h1 class="page-title">🔑 로그인</h1>
    </header>

    <p class="field__hint">아이디와 비밀번호를 입력해 주세요.</p>

    <div class="field">
        <label class="field__label" for="username">아이디</label>
        <input type="text" id="username" class="field__input" autocomplete="username" placeholder="예: hong123" autocapitalize="none">
    </div>

    <div class="field">
        <label class="field__label" for="password">비밀번호</label>
        <input type="password" id="password" class="field__input" autocomplete="current-password" placeholder="비밀번호">
    </div>

    <button type="button" class="btn btn--primary" id="loginBtn">로그인 ➔</button>
    <p id="msg" class="notice" style="display:none; margin-top:14px;"></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseConfig.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script>
    const msg = document.getElementById("msg");
    function showMsg(text) { msg.textContent = text; msg.style.display = "block"; }

    // 이미 로그인돼 있으면 대시보드로
    (async function () {
        if (!isSupabaseReady()) { showMsg("⚠️ 로그인 기능이 아직 설정되지 않았습니다. (관리자에게 문의)"); return; }
        const session = await getSession();
        if (session) window.location.replace("dashboard.html");
    })();

    async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        if (!username || !password) { showMsg("아이디와 비밀번호를 모두 입력해 주세요."); return; }
        const btn = document.getElementById("loginBtn");
        btn.disabled = true; btn.style.opacity = "0.6";
        try {
            await login(username, password);
            window.location.replace("dashboard.html");
        } catch (e) {
            showMsg("아이디 또는 비밀번호를 확인해주세요.");
            btn.disabled = false; btn.style.opacity = "1";
        }
    }
    document.getElementById("loginBtn").addEventListener("click", doLogin);
    document.getElementById("password").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
